# Production compose cho VM ai-law dùng chung.
# KHÁC với docker-compose.yml gốc: KHÔNG có service proxy (host Caddy lo TLS/proxy),
# web publish ra 127.0.0.1:3001 (8000 đã bị ai-law dùng), db+storage chỉ nội bộ (0 xung đột).
name: khupho
services:
  web:
    build:
      context: .
      args:
        BASE_PATH: ""
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-khupho}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-khupho}
      MINIO_ENDPOINT: storage
      MINIO_PORT: "9000"
    ports:
      - "127.0.0.1:3001:3000"   # chỉ host Caddy truy cập, không lộ ra ngoài
    depends_on:
      db:
        condition: service_healthy
      storage:
        condition: service_healthy
    networks: [internal]

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-khupho}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-khupho}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-khupho} -d ${POSTGRES_DB:-khupho}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]
    # KHÔNG publish port — tách hoàn toàn khỏi postgres của ai-law (5432)

  storage:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]
    # KHÔNG publish port — tách hoàn toàn khỏi minio của ai-law (9000/9001)

volumes:
  db_data:
  minio_data:

networks:
  internal:
    driver: bridge
