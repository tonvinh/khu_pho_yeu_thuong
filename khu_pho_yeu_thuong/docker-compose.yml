# Toàn bộ infra Docker (07 §2.2 — quyết định D12): 4 service, chỉ proxy mở port.
# Khởi động từ máy sạch: cp .env.example .env (điền secret) → docker compose up -d
#   → docker compose run --rm web node scripts/migrate.mjs
services:
  web:
    build:
      context: .
      args:
        BASE_PATH: ${BASE_PATH:-}
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-khupho}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-khupho}
      MINIO_ENDPOINT: storage
      MINIO_PORT: "9000"
    depends_on:
      db:
        condition: service_healthy
      storage:
        condition: service_healthy
    networks: [internal]
    # KHÔNG expose port — chỉ proxy được ra ngoài

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-khupho}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-khupho}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-khupho} -d ${POSTGRES_DB:-khupho}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  storage:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks: [internal]

volumes:
  db_data:
  minio_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
